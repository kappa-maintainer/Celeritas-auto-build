name: Auto Releases

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:

  check:

    outputs:
      should_run: ${{ steps.checker.outputs.should_run }}
      commit_hash: ${{ steps.latest.outputs.commit_hash }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Get latest hash
        id: latest
        run: |
          commit_hash=$(git ls-remote https://git.taumc.org/embeddedt/celeritas.git HEAD | cut -f1)
          test -n "$commit_hash"
          echo "commit_hash=$commit_hash" >> "$GITHUB_OUTPUT"

      - name: Get previous hash
        id: previous
        run: echo "commit_hash=$(cat ./latest_commit)" >> "$GITHUB_OUTPUT"

      - name: Check if new commits appear
        id: checker
        run: |
          if [[ "${{ steps.latest.outputs.commit_hash }}" == "${{ steps.previous.outputs.commit_hash }}" ]]
          then
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi


  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [check]
    if: needs.check.outputs.should_run == 'true'
    steps:
      - name: Debug
        run: echo "${{ needs.check.outputs.should_run }}"

      - name: Checkout this repository
        uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Checkout Celeritas
        run: |
          git clone --depth 1 --no-tags \
            https://git.taumc.org/embeddedt/celeritas.git

      - name: Verify source revision
        working-directory: ./celeritas
        run: |
          test "$(git rev-parse HEAD)" = "${{ needs.check.outputs.commit_hash }}"

      - name: Set commit hash
        run: echo "COMMIT_HASH=${{ needs.check.outputs.commit_hash }}" >> "$GITHUB_ENV"

      - name: Get current date
        run: echo "CURRENT_DATE=$(date +'%Y%m%dT%H%M%S')" >> "$GITHUB_ENV"

      - name: Set release tag
        run: echo "RELEASE_TAG=commit-${COMMIT_HASH}-${CURRENT_DATE}" >> "$GITHUB_ENV"

      - name: Write release body file
        working-directory: ./celeritas
        run: |
          echo "Built on commit: [${COMMIT_HASH}](https://git.taumc.org/embeddedt/celeritas/commit/${COMMIT_HASH})" > body.txt

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Fix Gradle permission
        run: chmod +x ./celeritas/gradlew

      - name: Build Jars
        working-directory: ./celeritas
        run: ./gradlew -Pceleritas_target_versions=1.12.2 packageJar

      - name: Update hash storage
        run: echo "$COMMIT_HASH" > ./latest_commit

      - name: Commit hash update
        uses: EndBug/add-and-commit@v10
        with:
          add: 'latest_commit'
          push: true
          tag: ${{ env.RELEASE_TAG }}

      - uses: ncipollo/release-action@v1.21.0
        with:
          artifacts: 'celeritas/build/libs/**/*.jar'
          generateReleaseNotes: false
          bodyFile: "celeritas/body.txt"
          tag: ${{ env.RELEASE_TAG }}
