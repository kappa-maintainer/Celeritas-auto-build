name: Auto Releases

on:
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: Upload build output as an Actions artifact instead of a GitHub Release
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "0 0 * * *"

jobs:

  check:

    outputs:
      should_run: ${{ steps.checker.outputs.should_run }}
      commit_hash: ${{ steps.latest.outputs.commit_hash }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Get latest hash
        id: latest
        run: |
          commit_hash=$(git ls-remote https://git.taumc.org/embeddedt/celeritas.git HEAD | cut -f1)
          test -n "$commit_hash"
          echo "commit_hash=$commit_hash" >> "$GITHUB_OUTPUT"

      - name: Get previous hash
        id: previous
        run: echo "commit_hash=$(cat ./latest_commit)" >> "$GITHUB_OUTPUT"

      - name: Check if new commits appear
        id: checker
        run: |
          if [[ "${{ inputs.upload_artifact }}" == "true" || "${{ steps.latest.outputs.commit_hash }}" != "${{ steps.previous.outputs.commit_hash }}" ]]
          then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi


  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [check]
    if: needs.check.outputs.should_run == 'true'
    steps:
      - name: Debug
        run: echo "${{ needs.check.outputs.should_run }}"

      - name: Checkout this repository
        uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Checkout Celeritas
        run: |
          git clone --depth 1 --no-tags \
            https://git.taumc.org/embeddedt/celeritas.git

      - name: Verify source revision
        working-directory: ./celeritas
        run: |
          test "$(git rev-parse HEAD)" = "${{ needs.check.outputs.commit_hash }}"

      - name: Set commit hash
        run: echo "COMMIT_HASH=${{ needs.check.outputs.commit_hash }}" >> "$GITHUB_ENV"

      - name: Set Maven version
        run: |
          base_version=$(grep '^project_base_version=' ./celeritas/gradle.properties | cut -d= -f2)
          test -n "$base_version"
          echo "MAVEN_VERSION=${base_version}.0-autobuild.${COMMIT_HASH:0:8}" >> "$GITHUB_ENV"

      - name: Get current date
        run: echo "CURRENT_DATE=$(date +'%Y%m%dT%H%M%S')" >> "$GITHUB_ENV"

      - name: Set release tag
        run: echo "RELEASE_TAG=commit-${COMMIT_HASH}-${CURRENT_DATE}" >> "$GITHUB_ENV"

      - name: Write release body file
        working-directory: ./celeritas
        run: |
          echo "Built on commit: [${COMMIT_HASH}](https://git.taumc.org/embeddedt/celeritas/commit/${COMMIT_HASH})" > body.txt

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Fix Gradle permission
        run: chmod +x ./celeritas/gradlew

      - name: Build Jars
        working-directory: ./celeritas
        run: |
          ./gradlew -Pceleritas_target_versions=1.12.2 \
            :forge122:packageJar \
            :forge122:jar \
            :forge122:sourcesJar

      - name: Collect release Jars
        shell: bash
        run: |
          set -euo pipefail

          echo "Production output:"
          find celeritas/build/libs -type f -name '*.jar' -print | sort
          echo "Forge 1.12.2 output:"
          find celeritas/forge122/build/libs -type f -name '*.jar' -print | sort

          mapfile -t production_jars < <(find celeritas/build/libs -type f -name 'celeritas-forge-mc12.2-*-dev.jar' ! -name '*-dev-dev.jar' | sort)
          mapfile -t development_jars < <(find celeritas/forge122/build/libs -type f -name 'celeritas-forge-mc12.2-*-dev-dev.jar' | sort)
          mapfile -t source_jars < <(find celeritas/forge122/build/libs -type f -name 'celeritas-forge-mc12.2-*-sources.jar' | sort)

          printf 'Runnable JARs:\n%s\n' "${production_jars[@]:-<none>}"
          printf 'Development JARs:\n%s\n' "${development_jars[@]:-<none>}"
          printf 'Source JARs:\n%s\n' "${source_jars[@]:-<none>}"

          test "${#production_jars[@]}" -eq 1
          test "${#development_jars[@]}" -eq 1
          test "${#source_jars[@]}" -eq 1

          mkdir -p artifacts
          cp "${production_jars[0]}" "artifacts/01-$(basename "${production_jars[0]}")"
          cp "${development_jars[0]}" "artifacts/02-$(basename "${development_jars[0]}")"
          cp "${source_jars[0]}" "artifacts/03-$(basename "${source_jars[0]}")"

      - name: Publish Maven artifacts
        env:
          OUTLANDS_USR: ${{ secrets.OUTLANDS_USR }}
          OUTLANDS_PWD: ${{ secrets.OUTLANDS_PWD }}
        working-directory: ./celeritas
        run: |
          set -euo pipefail
          test -n "$OUTLANDS_USR"
          test -n "$OUTLANDS_PWD"

          cat > "$RUNNER_TEMP/publish-to-outlands.gradle" <<'EOF'
          import org.gradle.authentication.http.BasicAuthentication
          import org.gradle.api.publish.PublishingExtension
          import org.gradle.api.publish.maven.MavenPublication

          gradle.projectsEvaluated {
              if (rootProject.name != "celeritas") return

              def forge122 = rootProject.project(":forge122")
              def common = rootProject.project(":common")

              allprojects {
                  version = System.getenv("MAVEN_VERSION")
              }

              [forge122, common].each { targetProject ->
                  targetProject.extensions.configure(PublishingExtension) {
                      repositories.clear()
                      repositories.maven {
                          name = "outlands"
                          url = uri("https://maven.outlands.top/releases")
                          credentials {
                              username = System.getenv("OUTLANDS_USR")
                              password = System.getenv("OUTLANDS_PWD")
                          }
                          authentication {
                              basic(BasicAuthentication)
                          }
                      }
                  }
              }

              forge122.extensions.configure(PublishingExtension) {
                  publications.named("default", MavenPublication) {
                      version = System.getenv("MAVEN_VERSION")
                      artifact(forge122.tasks.named("jar")) {
                          classifier = "dev"
                      }
                  }
              }

              common.extensions.configure(PublishingExtension) {
                  publications.named("mavenJava", MavenPublication) {
                      version = System.getenv("MAVEN_VERSION")
                  }
              }
          }
          EOF

          ./gradlew \
            -Pceleritas_target_versions=1.12.2 \
            --init-script "$RUNNER_TEMP/publish-to-outlands.gradle" \
            :forge122:publishDefaultPublicationToOutlandsRepository \
            :common:publishMavenJavaPublicationToOutlandsRepository

      - name: Update hash storage
        if: inputs.upload_artifact != true
        run: echo "$COMMIT_HASH" > ./latest_commit

      - name: Commit hash update
        if: inputs.upload_artifact != true
        uses: EndBug/add-and-commit@v10
        with:
          add: 'latest_commit'
          push: true
          tag: ${{ env.RELEASE_TAG }}

      - name: Upload build artifact
        if: inputs.upload_artifact == true
        uses: actions/upload-artifact@v7
        with:
          name: celeritas-${{ env.RELEASE_TAG }}
          path: artifacts/
          if-no-files-found: error

      - name: Publish GitHub Release
        if: inputs.upload_artifact != true
        uses: ncipollo/release-action@v1.21.0
        with:
          artifacts: 'artifacts/*.jar'
          generateReleaseNotes: false
          bodyFile: "celeritas/body.txt"
          tag: ${{ env.RELEASE_TAG }}
